services:
  - type: web
    name: whatsapp-baileys-bot
    env: node
    plan: starter # Starter plan is required for Persistent Disks on Render
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /status?phoneNumber=system_ping
    disk:
      name: bot-auth-data
      mountPath: /opt/render/project/src/data
      sizeGB: 1
    envVars:
      - key: PORT
        value: 3000
      - key: FIREBASE_DATABASE_URL
        sync: false # Set this in the Render Dashboard (e.g. https://your-project.firebaseio.com)
      - key: FIREBASE_SERVICE_ACCOUNT_BASE64
        sync: false # Set this in the Render Dashboard (Base64 encoded Firebase JSON)
