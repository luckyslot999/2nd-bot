name: W-Broadcaster-Bot

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */5 * * *' 

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 350 # GitHub limit is 360 mins (6 hours). This will prevent crash errors.
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm install

      - name: Start Multi-Device Broadcaster
        env:
          FIREBASE_URL: ${{ secrets.FIREBASE_URL }}
        run: npm start
